<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TítuloCientífico — Evaluador Vancouver e ICMJE</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #F5F2EC; --bg2: #EDE9E0; --ink: #1A1714; --ink3: #7A746C;
            --accent: #C4440E; --green: #2D6A4F; --green-bg: #D8F0E5;
            --red: #8B1A1A; --red-bg: #F5DADA; --border: #D0C9BE;
            --radius-lg: 8px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Instrument Sans', sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; padding: 2rem; }
        header { max-width: 900px; margin: 0 auto 2rem; display: flex; align-items: baseline; gap: 1rem; }
        .logo { font-family: 'DM Serif Display', serif; font-size: 24px; }
        .logo span { color: var(--accent); }
        main { max-width: 900px; margin: 0 auto; }
        
        /* Input */
        .title-input-wrap { position: relative; margin-bottom: 2rem; }
        textarea { 
            width: 100%; font-family: 'DM Serif Display', serif; font-size: 22px; 
            background: transparent; border: none; border-bottom: 2px solid var(--ink); 
            padding: 1rem 0; outline: none; resize: none; min-height: 80px;
        }
        .char-count { position: absolute; right: 0; bottom: -25px; font-family: 'DM Mono'; font-size: 12px; }

        /* Buttons */
        .btn-analyze { 
            background: var(--ink); color: var(--bg); border: none; padding: 12px 24px; 
            border-radius: 4px; cursor: pointer; font-weight: 600; transition: 0.2s;
        }
        .btn-analyze:disabled { background: var(--border); cursor: not-allowed; opacity: 0.6; }
        .btn-analyze:hover:not(:disabled) { background: var(--accent); }

        /* Results */
        #results { display: none; margin-top: 3rem; }
        .score-panel { 
            background: var(--ink); color: var(--bg); padding: 2rem; border-radius: var(--radius-lg);
            display: grid; grid-template-columns: auto 1fr; gap: 2rem; align-items: center; margin-bottom: 2rem;
        }
        .score-big { font-family: 'DM Serif Display'; font-size: 64px; }
        .progress-bar { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; margin: 10px 0; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.8s; }

        .rewrite-box { background: var(--bg2); padding: 1.5rem; border-radius: var(--radius-lg); border: 1px solid var(--border); margin-bottom: 2rem; }
        .item-row { 
            background: #fff; padding: 1rem; border-radius: 6px; margin-bottom: 0.5rem; 
            border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;
        }
        .badge { font-size: 10px; padding: 4px 8px; border-radius: 4px; font-weight: bold; text-transform: uppercase; }
        
        @media (max-width: 600px) { .score-panel { grid-template-columns: 1fr; text-align: center; } }
    </style>
</head>
<body>

<header>
    <div class="logo">TítuloCien<span>tífico</span></div>
    <div style="font-family:'DM Mono'; font-size:12px; color:var(--ink3)">v2.0 Vancouver Edition</div>
</header>

<main>
    <div class="title-input-wrap">
        <textarea id="titleInput" placeholder="Escribe el título de tu investigación aquí..."></textarea>
        <div id="charCount" class="char-count">0 / 280</div>
    </div>

    <button id="btnAnalyze" class="btn-analyze" disabled>Evaluar título</button>
    <button onclick="location.reload()" style="background:none; border:1px solid var(--border); padding:11px 20px; border-radius:4px; cursor:pointer; margin-left:10px">Limpiar</button>

    <div id="results">
        <div class="score-panel">
            <div class="score-big" id="scoreBig">0/5</div>
            <div>
                <div id="verdictTitle" style="font-size:18px; font-weight:600; margin-bottom:5px">Analizando...</div>
                <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
                <div id="scoreDesc" style="font-size:12px; color:var(--bg3); opacity:0.7">Criterios de Vancouver cumplidos</div>
            </div>
        </div>

        <div class="rewrite-box">
            <div style="font-family:'DM Mono'; font-size:11px; text-transform:uppercase; margin-bottom:8px; color:var(--ink3)">Sugerencia Estilo Vancouver</div>
            <div id="vancouverTitle" style="font-family:'DM Serif Display'; font-size:20px; font-style:italic"></div>
        </div>

        <div id="checklist"></div>
    </div>
</main>

<script>
    const input = document.getElementById('titleInput');
    const btn = document.getElementById('btnAnalyze');
    const resultsArea = document.getElementById('results');

    // 1. Escuchar escritura para activar botón
    input.addEventListener('input', () => {
        const val = input.value.trim();
        document.getElementById('charCount').textContent = `${val.length} / 280`;
        
        // El botón se activa con 5 caracteres o más
        btn.disabled = val.length < 5;
        
        input.style.height = 'auto';
        input.style.height = input.scrollHeight + 'px';
    });

    // 2. Función principal de evaluación
    btn.addEventListener('click', () => {
        const text = input.value.trim();
        if(!text) return;

        btn.textContent = "Evaluando...";
        btn.disabled = true;

        // Simular pequeño retraso para feedback visual
        setTimeout(() => {
            const analysis = evaluateVancouver(text);
            displayResults(analysis, text);
            
            btn.textContent = "Volver a evaluar";
            btn.disabled = false;
        }, 400);
    });

    function evaluateVancouver(t) {
        const words = t.split(/\s+/).filter(Boolean);
        const criteria = [
            {
                id: 1,
                label: "Sin artículos iniciales",
                ok: !/^(El|La|Los|Las|Un|Una|The|A|An)\b/i.test(t),
                desc: "Vancouver prefiere empezar con la palabra clave (ej: 'Diabetes' en lugar de 'La diabetes')."
            },
            {
                id: 2,
                label: "Diseño de estudio explícito",
                ok: /:\s*(ensayo|estudio|revisión|metaanálisis|ECA|cohorte|transversal)/i.test(t),
                desc: "Incluye el diseño tras dos puntos (ej: ': ensayo clínico aleatorizado')."
            },
            {
                id: 3,
                label: "Uso de términos MeSH",
                ok: /\b(diabetes|hipertensión|infarto|cáncer|terapia|vacuna|tratamiento|prevención)\b/i.test(t.toLowerCase()),
                desc: "Utiliza términos normalizados de salud."
            },
            {
                id: 4,
                label: "Concisión Vancouver",
                ok: words.length >= 8 && words.length <= 15,
                desc: "El rango ideal es de 10 a 15 palabras para indexación."
            },
            {
                id: 5,
                label: "Sin marcas comerciales",
                ok: !/\b(Prozac|Viagra|Advil|Tylenol|Lipitor|Voltaren)\b/i.test(t),
                desc: "Usa siempre el nombre genérico (DCI) de los fármacos."
            }
        ];

        return criteria;
    }

    function displayResults(data, originalTitle) {
        const checklist = document.getElementById('checklist');
        checklist.innerHTML = "";
        
        let score = 0;
        data.forEach(item => {
            if(item.ok) score++;
            const row = document.createElement('div');
            row.className = 'item-row';
            row.innerHTML = `
                <div>
                    <div style="font-weight:600; font-size:14px">${item.label}</div>
                    <div style="font-size:12px; color:var(--ink3)">${item.desc}</div>
                </div>
                <span class="badge" style="background:${item.ok ? 'var(--green-bg)' : 'var(--red-bg)'}; color:${item.ok ? 'var(--green)' : 'var(--red)'}">
                    ${item.ok ? '✓ Cumple' : '✕ Revisar'}
                </span>
            `;
            checklist.appendChild(row);
        });

        // Actualizar Panel de Puntuación
        const pct = (score / data.length) * 100;
        document.getElementById('scoreBig').textContent = `${score}/${data.length}`;
        document.getElementById('progressFill').style.width = `${pct}%`;
        document.getElementById('verdictTitle').textContent = score >= 4 ? "Título de Alta Calidad" : "Necesita Optimización";
        
        // Generar propuesta Vancouver
        document.getElementById('vancouverTitle').textContent = generateVancouverSuggestion(originalTitle);

        // Mostrar sección de resultados
        resultsArea.style.display = 'block';
        resultsArea.scrollIntoView({ behavior: 'smooth' });
    }

    function generateVancouverSuggestion(t) {
        // Limpiar artículos iniciales
        let s = t.trim().replace(/^(El|La|Los|Las|Un|Una|The|A|An)\s+/i, '');
        s = s.charAt(0).toUpperCase() + s.slice(1);

        // Si no tiene diseño, añadir sugerencia
        if (!s.includes(':')) {
            s += ": [añadir diseño del estudio]";
        }
        
        return s;
    }
</script>

</body>
</html>
